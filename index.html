<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eko.energy</title>
    <style>
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #FDFAF0; /* Seamless transition matching the logo canvas */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .logo-container {
            /* Uses 90% of whichever viewport axis is smaller (width vs height) */
            width: 90vmin;
            max-width: 550px;
            max-height: 550px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="logo.svg" alt="eko.energy logo">
    </div>
</body>
</html>
